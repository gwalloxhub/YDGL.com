<!DOCTYPE html>
<html>
<head>
<title>YDGL ULTRA SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(#0f2027,#2c5364);
  color:white;
}

header{
  text-align:center;
  padding:20px;
}

.container{
  padding:15px;
}

.card{
  background:white;
  color:black;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

input, select{
  width:100%;
  padding:10px;
  margin:5px 0;
}

button{
  width:100%;
  padding:12px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:8px;
}

.stats{
  background:#111;
  padding:15px;
  text-align:center;
}
</style>
</head>

<body>

<header>
<h2>YDGL SMART SERVICES</h2>
<p>ULTRA PAYMENT SYSTEM</p>
</header>

<div class="stats">
<h3>Total Earnings: ₦<span id="total">0</span></h3>
<h4>Orders: <span id="count">0</span></h4>
</div>

<div class="container">

<div class="card">
<h3>📦 Place Order</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">

<select id="service">
<option value="300">1GB Data - ₦300</option>
<option value="600">2GB Data - ₦600</option>
<option value="200">Movies - ₦200</option>
<option value="100">POS - ₦100</option>
</select>

<button onclick="pay()">Pay Now</button>
</div>

<div class="card">
<h3>📋 Orders</h3>
<div id="orders"></div>
</div>

</div>

<script>

function loadStats(){
let orders = JSON.parse(localStorage.getItem("orders")||"[]");

let total = 0;
orders.forEach(o=> total += o.amount);

document.getElementById("total").innerText = total;
document.getElementById("count").innerText = orders.length;

let html="";
orders.forEach(o=>{
html += `<p>${o.name} - ₦${o.amount}</p>`;
});
document.getElementById("orders").innerHTML = html;
}

function pay(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let amount = document.getElementById("service").value;

if(!name || !phone){
alert("Fill all details");
return;
}

var handler = PaystackPop.setup({
key: 'YOUR_PUBLIC_KEY_HERE',
email: 'customer@email.com',
amount: amount * 100,
currency: "NGN",

callback: function(response){

let order = {
name:name,
phone:phone,
amount:parseInt(amount)
};

let orders = JSON.parse(localStorage.getItem("orders")||"[]");
orders.push(order);
localStorage.setItem("orders", JSON.stringify(orders));

let msg = `NEW PAYMENT:%0AName:${name}%0APhone:${phone}%0AAmount:₦${amount}`;
window.open(`https://wa.me/2349060996976?text=${msg}`);

alert("Payment Successful!");

loadStats();
},

onClose: function(){
alert("Payment cancelled");
}
});

handler.openIframe();
}

loadStats();

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>YDGL SMART SERVICES</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

/* HEADER */
header{
  padding:20px;
}

.logo{
  width:100px;
  border-radius:50%;
}

/* BALANCE */
.balance{
  background:rgba(0,0,0,0.5);
  margin:15px;
  padding:15px;
  border-radius:12px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.9);
  color:black;
  padding:15px;
  margin:15px;
  border-radius:12px;
}

/* INPUT */
input, select{
  width:90%;
  padding:10px;
  margin:5px;
}

/* BUTTON */
button{
  width:90%;
  padding:12px;
  background:#28a745;
  color:white;
  border:none;
  border-radius:8px;
}

/* HISTORY */
.history{
  text-align:left;
  max-height:150px;
  overflow:auto;
  background:#111;
  padding:10px;
  border-radius:10px;
}

</style>
</head>

<body>

<header>
<img src="logo.jpg" class="logo">
<h2>YDGL SMART SERVICES</h2>
</header>

<div class="balance">
<h3>💰 Wallet Balance</h3>
<h2 id="bal">₦5000</h2>
<button onclick="addMoney()">Add ₦1000</button>
</div>

<div class="card">

<h3>📦 Place Order</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">

<select id="service">
<option value="300">1GB Data - ₦300</option>
<option value="600">2GB Data - ₦600</option>
<option value="200">Movies - ₦200</option>
<option value="100">POS - ₦100</option>
</select>

<button onclick="buy()">Buy Now</button>

</div>

<div class="card">
<h3>📜 Order History</h3>
<div class="history" id="history"></div>
</div>

<script>

let balance = localStorage.getItem("bal") || 5000;
let history = localStorage.getItem("his") || "";

document.getElementById("bal").innerText = "₦" + balance;
document.getElementById("history").innerHTML = history;

function addMoney(){
balance = parseInt(balance) + 1000;
localStorage.setItem("bal", balance);
document.getElementById("bal").innerText = "₦" + balance;
alert("Balance updated!");
}

function buy(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;
let amount = document.getElementById("service").value;

if(!name || !phone){
alert("Fill details");
return;
}

if(balance < amount){
alert("Not enough balance");
return;
}

balance -= amount;
localStorage.setItem("bal", balance);
document.getElementById("bal").innerText = "₦" + balance;

let record = `<p>✔ ${name} bought ₦${amount}</p>`;
history += record;

localStorage.setItem("his", history);
document.getElementById("history").innerHTML = history;

alert("Order Successful!");

}

</script>

</body>
</html>

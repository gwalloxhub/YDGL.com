<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YDGL SMART SERVICES</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0a1f44,#0f9d58);
    color:white;
    text-align:center;
}

.container{
    padding:20px;
}

.logo{
    width:120px;
}

.box{
    background:white;
    color:black;
    margin:10px;
    padding:15px;
    border-radius:12px;
}

input, select{
    width:85%;
    padding:10px;
    margin:5px;
    border-radius:8px;
    border:1px solid #ccc;
}

button{
    background:#0f9d58;
    color:white;
    border:none;
    padding:12px;
    width:85%;
    margin:10px;
    border-radius:8px;
    font-size:16px;
}
</style>

<script src="https://js.paystack.co/v1/inline.js"></script>

</head>

<body>

<div class="container">

<img src="logo.jpg" class="logo">

<h1>YDGL SMART SERVICES</h1>
<p>Fast • Secure • Reliable</p>

<!-- ORDER + PAYMENT -->
<div class="box">
<h3>📶 Buy Data / Service</h3>

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone Number">

<select id="network">
<option>MTN</option>
<option>Airtel</option>
<option>Glo</option>
<option>9mobile</option>
</select>

<input type="number" id="amount" placeholder="Enter Amount (₦)">

<button onclick="payNow()">Pay with Card 💳</button>
<button onclick="sendOrder()">Order via WhatsApp</button>

</div>

<!-- OPAY -->
<div class="box">
<h3>💰 Pay via OPay</h3>
<p>Account: 9060996976</p>

<button onclick="copyAccount()">Copy Account</button>
<button onclick="sendProof()">Send Proof</button>
</div>

<!-- SUCCESS -->
<div id="successBox" style="display:none; background:white; color:black; padding:20px; border-radius:10px; margin:20px;">
<h3>✅ Payment Successful</h3>
<p>Mun karɓi kuɗinka. Za a tuntube ka nan ba da jimawa ba.</p>
</div>

</div>

<script>

// COPY
function copyAccount(){
    navigator.clipboard.writeText("9060996976");
    alert("Account copied!");
}

// WHATSAPP ORDER
function sendOrder(){
    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;
    let network = document.getElementById("network").value;
    let amount = document.getElementById("amount").value;

    let msg = `Name: ${name}%0APhone: ${phone}%0ANetwork: ${network}%0AAmount: ₦${amount}`;

    window.location.href = "https://wa.me/2347086506334?text=" + msg;
}

// PAYMENT
function payNow(){

    let email = "customer@email.com";
    let amount = document.getElementById("amount").value * 100;

    if(amount == 0){
        alert("Enter amount!");
        return;
    }

    var handler = PaystackPop.setup({
        key: 'YOUR_PUBLIC_KEY_HERE',
        email: email,
        amount: amount,
        currency: "NGN",

        callback: function(response){
            document.getElementById("successBox").style.display = "block";
        },

        onClose: function(){
            alert("Payment cancelled");
        }
    });

    handler.openIframe();
}

function sendProof(){
    window.location.href="https://wa.me/2347086506334?text=Na%20biya,%20ga%20proof";
}

</script>

</body>
</html>
